    <rect x="86" y="178" width="248" height="16" rx="8" fill="#efeaff" opacity="0.22"/>
    <text x="86" y="392" fill="#d7d1ef" font-family="Sora, Work Sans, Avenir Next, Segoe UI, sans-serif" font-size="34" font-weight="700">Ocala, Florida</text>
  </g>

  <g transform="translate(688 448)" filter="url(#softShadow)">
    <path d="M -560 420 C -96 238 438 170 1010 222 C 1324 250 1648 344 1880 496 L 1698 840 C 1138 1046 360 1014 -498 802 Z" fill="url(#counter)"/>
