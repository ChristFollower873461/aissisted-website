<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1350" viewBox="0 0 2400 1350" role="img" aria-labelledby="title desc">
  <title id="title">Local founder and contact background</title>
  <desc id="desc">A branded AIssisted Consulting background showing a local small-business counter, contact card, phone, map pin, and practical founder-led help cues in dark navy, gold, coral, violet, and mint lighting.</desc>
  <defs>
    <radialGradient id="goldGlow" cx="18%" cy="20%" r="56%">
      <stop offset="0%" stop-color="#f0d060" stop-opacity="0.30"/>
      <stop offset="46%" stop-color="#8a8bdd" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#0b1120" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coralGlow" cx="88%" cy="82%" r="54%">
      <stop offset="0%" stop-color="#c4456a" stop-opacity="0.48"/>
      <stop offset="42%" stop-color="#3d1d5e" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#0b1120" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="78%" cy="24%" r="36%">
      <stop offset="0%" stop-color="#67d9b0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0b1120" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="room" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#151230"/>
      <stop offset="48%" stop-color="#101b34"/>
      <stop offset="100%" stop-color="#0b1120"/>
    </linearGradient>
    <linearGradient id="counter" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#26365d"/>
      <stop offset="48%" stop-color="#152344"/>
      <stop offset="100%" stop-color="#090e1d"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff4d4"/>
      <stop offset="100%" stop-color="#d7d1ef"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1c2d56" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#0b1120" stop-opacity="0.72"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#222b44"/>
      <stop offset="100%" stop-color="#070b16"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="170%" height="180%">
      <feDropShadow dx="0" dy="34" stdDeviation="30" flood-color="#03050e" flood-opacity="0.48"/>
    </filter>
    <filter id="closeShadow" x="-25%" y="-30%" width="150%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#03050e" flood-opacity="0.38"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.84" numOctaves="2" seed="61" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.16"/>
      </feComponentTransfer>
    </filter>
    <pattern id="wallLines" width="130" height="130" patternUnits="userSpaceOnUse">
      <path d="M 130 0 L 0 0 0 130" fill="none" stroke="#efeaff" stroke-opacity="0.035" stroke-width="2"/>
    </pattern>
    <pattern id="counterLines" width="170" height="170" patternUnits="userSpaceOnUse">
      <path d="M 0 0 L 170 170 M 170 0 L 0 170" stroke="#efeaff" stroke-opacity="0.025" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="2400" height="1350" fill="url(#room)"/>
  <rect width="2400" height="1350" fill="url(#goldGlow)"/>
  <rect width="2400" height="1350" fill="url(#coralGlow)"/>
  <rect width="2400" height="1350" fill="url(#mintGlow)"/>
  <rect width="2400" height="1350" fill="url(#wallLines)" opacity="0.75"/>

