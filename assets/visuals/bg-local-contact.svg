      <rect x="32" y="62" width="104" height="10" rx="5" fill="#efeaff" opacity="0.28"/>
      <rect x="218" y="0" width="176" height="100" rx="26" fill="#152344"/>
      <rect x="250" y="28" width="82" height="13" rx="7" fill="#67d9b0"/>
      <rect x="250" y="62" width="104" height="10" rx="5" fill="#efeaff" opacity="0.28"/>
      <rect x="436" y="0" width="176" height="100" rx="26" fill="#152344"/>
      <rect x="468" y="28" width="82" height="13" rx="7" fill="#8a8bdd"/>
      <rect x="468" y="62" width="104" height="10" rx="5" fill="#efeaff" opacity="0.28"/>
    </g>
    <path d="M -68 540 L 810 540 C 844 540 864 566 852 596 C 840 624 810 638 768 638 L -86 638 C -128 638 -158 616 -150 584 C -142 556 -112 540 -68 540 Z" fill="#070b16" opacity="0.88"/>
  </g>

  <g transform="translate(322 718) rotate(-8)" filter="url(#closeShadow)">
    <rect x="0" y="0" width="610" height="352" rx="42" fill="url(#card)"/>
    <rect x="46" y="48" width="164" height="22" rx="11" fill="#f0d060"/>
    <text x="46" y="132" fill="#151230" font-family="Sora, Work Sans, Avenir Next, Segoe UI, sans-serif" font-size="58" font-weight="850">AI Guy</text>
    <text x="48" y="184" fill="#3d1d5e" font-family="Sora, Work Sans, Avenir Next, Segoe UI, sans-serif" font-size="32" font-weight="750">AIssisted Consulting</text>
    <rect x="48" y="230" width="306" height="16" rx="8" fill="#151230" opacity="0.34"/>
    <rect x="48" y="274" width="230" height="16" rx="8" fill="#151230" opacity="0.24"/>
