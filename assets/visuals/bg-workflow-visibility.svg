<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1350" viewBox="0 0 2400 1350" role="img" aria-labelledby="title desc">
  <title id="title">Workflow visibility background</title>
  <desc id="desc">A branded AIssisted Consulting background showing owner-facing workflow visibility with intake, follow-up, review cards, and calm dashboard surfaces.</desc>
  <defs>
    <radialGradient id="goldGlow" cx="18%" cy="18%" r="56%">
      <stop offset="0%" stop-color="#f0d060" stop-opacity="0.30"/>
      <stop offset="46%" stop-color="#8a8bdd" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0b1120" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coralGlow" cx="88%" cy="78%" r="55%">
      <stop offset="0%" stop-color="#c4456a" stop-opacity="0.48"/>
      <stop offset="48%" stop-color="#3d1d5e" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#0b1120" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="72%" cy="24%" r="38%">
      <stop offset="0%" stop-color="#67d9b0" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#0b1120" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#151230"/>
      <stop offset="48%" stop-color="#101b34"/>
      <stop offset="100%" stop-color="#0b1120"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1c2d56"/>
      <stop offset="54%" stop-color="#152344"/>
      <stop offset="100%" stop-color="#090e1d"/>
    </linearGradient>
    <linearGradient id="panelAlt" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#20245a"/>
      <stop offset="54%" stop-color="#151230"/>
      <stop offset="100%" stop-color="#080b1b"/>
    </linearGradient>
    <linearGradient id="cardLight" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff4d4"/>
      <stop offset="100%" stop-color="#d8cee9"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-32%" width="170%" height="180%">
      <feDropShadow dx="0" dy="34" stdDeviation="30" flood-color="#03050e" flood-opacity="0.48"/>
    </filter>
    <filter id="closeShadow" x="-25%" y="-30%" width="150%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#03050e" flood-opacity="0.38"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" seed="43" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.16"/>
      </feComponentTransfer>
    </filter>
    <pattern id="grid" width="96" height="96" patternUnits="userSpaceOnUse">
      <path d="M 96 0 L 0 0 0 96" fill="none" stroke="#efeaff" stroke-opacity="0.045" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="2400" height="1350" fill="url(#bg)"/>
  <rect width="2400" height="1350" fill="url(#goldGlow)"/>
  <rect width="2400" height="1350" fill="url(#coralGlow)"/>
  <rect width="2400" height="1350" fill="url(#mintGlow)"/>

  <g opacity="0.26">
    <path d="M-80 256 C 274 126 610 140 934 292 C 1246 438 1510 406 1826 236 C 2072 104 2258 126 2500 262" fill="none" stroke="#8a8bdd" stroke-width="5" stroke-opacity="0.22"/>
    <path d="M-120 1096 C 340 940 704 984 1072 1132 C 1420 1272 1790 1248 2508 1012" fill="none" stroke="#f0d060" stroke-width="4" stroke-opacity="0.18"/>
  </g>

  <g transform="translate(438 196)" filter="url(#softShadow)">
    <rect x="0" y="0" width="1340" height="760" rx="76" fill="#060a15"/>
    <rect x="58" y="70" width="1224" height="612" rx="52" fill="url(#panel)"/>
    <rect x="58" y="70" width="1224" height="612" rx="52" fill="url(#grid)" opacity="0.9"/>
    <rect x="118" y="136" width="248" height="24" rx="12" fill="#f0d060"/>
    <rect x="118" y="196" width="500" height="17" rx="9" fill="#b7b8ff" opacity="0.62"/>
    <rect x="118" y="242" width="430" height="17" rx="9" fill="#67d9b0" opacity="0.56"/>
    <rect x="118" y="288" width="560" height="17" rx="9" fill="#efeaff" opacity="0.20"/>

    <g transform="translate(118 382)">
      <rect x="0" y="0" width="308" height="178" rx="34" fill="#101b34"/>
      <rect x="30" y="36" width="104" height="16" rx="8" fill="#f0d060"/>
      <rect x="30" y="82" width="218" height="12" rx="6" fill="#efeaff" opacity="0.32"/>
      <rect x="30" y="118" width="170" height="12" rx="6" fill="#efeaff" opacity="0.20"/>
      <circle cx="250" cy="58" r="28" fill="#f0d060" opacity="0.86"/>
    </g>
    <g transform="translate(472 382)">
      <rect x="0" y="0" width="308" height="178" rx="34" fill="#101b34"/>
      <rect x="30" y="36" width="126" height="16" rx="8" fill="#e8845a"/>
      <rect x="30" y="82" width="226" height="12" rx="6" fill="#efeaff" opacity="0.32"/>
      <rect x="30" y="118" width="162" height="12" rx="6" fill="#efeaff" opacity="0.20"/>
      <circle cx="250" cy="58" r="28" fill="#e8845a" opacity="0.84"/>
    </g>
    <g transform="translate(826 382)">
      <rect x="0" y="0" width="308" height="178" rx="34" fill="#101b34"/>
      <rect x="30" y="36" width="110" height="16" rx="8" fill="#67d9b0"/>
      <rect x="30" y="82" width="218" height="12" rx="6" fill="#efeaff" opacity="0.32"/>
      <rect x="30" y="118" width="188" height="12" rx="6" fill="#efeaff" opacity="0.20"/>
      <circle cx="250" cy="58" r="28" fill="#67d9b0" opacity="0.84"/>
    </g>

    <g transform="translate(792 132)">
      <path d="M 0 256 C 82 176 130 70 236 92 C 342 114 310 242 396 268" fill="none" stroke="#f0d060" stroke-width="18" stroke-linecap="round" opacity="0.76"/>
      <path d="M 0 256 C 82 176 130 70 236 92 C 342 114 310 242 396 268" fill="none" stroke="#fff6c9" stroke-width="4" stroke-linecap="round" opacity="0.42"/>
      <circle cx="0" cy="256" r="24" fill="#f0d060"/>
      <circle cx="236" cy="92" r="24" fill="#8a8bdd"/>
      <circle cx="396" cy="268" r="24" fill="#67d9b0"/>
    </g>
    <circle cx="670" cy="720" r="18" fill="#efeaff" opacity="0.16"/>
  </g>

  <g transform="translate(166 590) rotate(-8)" filter="url(#closeShadow)">
    <rect x="0" y="0" width="500" height="320" rx="38" fill="url(#cardLight)"/>
    <rect x="46" y="48" width="182" height="22" rx="11" fill="#c4456a" opacity="0.74"/>
    <rect x="46" y="104" width="348" height="14" rx="7" fill="#151230" opacity="0.34"/>
    <rect x="46" y="144" width="306" height="14" rx="7" fill="#151230" opacity="0.26"/>
    <rect x="46" y="184" width="382" height="14" rx="7" fill="#151230" opacity="0.22"/>
    <circle cx="82" cy="258" r="30" fill="#67d9b0" opacity="0.84"/>
    <path d="M 70 258 L 80 268 L 100 242" fill="none" stroke="#0b1120" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="132" y="270" fill="#151230" font-family="Sora, Work Sans, Avenir Next, Segoe UI, sans-serif" font-size="31" font-weight="850">review queue</text>
  </g>

  <g transform="translate(1546 740) rotate(8)" filter="url(#closeShadow)">
    <rect x="0" y="0" width="560" height="330" rx="44" fill="url(#panelAlt)"/>
    <rect x="46" y="48" width="150" height="22" rx="11" fill="#f0d060"/>
    <rect x="46" y="110" width="410" height="16" rx="8" fill="#efeaff" opacity="0.34"/>
    <rect x="46" y="156" width="358" height="16" rx="8" fill="#efeaff" opacity="0.24"/>
    <rect x="46" y="202" width="296" height="16" rx="8" fill="#efeaff" opacity="0.18"/>
    <g transform="translate(404 166)">
      <circle cx="0" cy="0" r="74" fill="#c4456a" opacity="0.44"/>
      <circle cx="0" cy="0" r="42" fill="#e8845a" opacity="0.82"/>
      <path d="M -20 2 L -2 20 L 30 -24" fill="none" stroke="#fff4cf" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <g transform="translate(890 938)" filter="url(#closeShadow)">
    <ellipse cx="0" cy="0" rx="348" ry="90" fill="#03050e" opacity="0.32"/>
    <rect x="-320" y="-124" width="640" height="178" rx="44" fill="#101b34"/>
    <rect x="-270" y="-78" width="198" height="18" rx="9" fill="#67d9b0"/>
    <rect x="-270" y="-30" width="470" height="14" rx="7" fill="#efeaff" opacity="0.34"/>
    <rect x="-270" y="10" width="380" height="14" rx="7" fill="#efeaff" opacity="0.22"/>
    <circle cx="248" cy="-34" r="38" fill="#f0d060" opacity="0.82"/>
  </g>

  <g opacity="0.72" font-family="Sora, Work Sans, Avenir Next, Segoe UI, sans-serif">
    <text x="150" y="214" fill="#fff4cf" font-size="54" font-weight="850">Workflow visibility</text>
    <text x="150" y="286" fill="#d7d1ef" font-size="32" font-weight="600">See intake, follow-up, and review points before the next decision</text>
  </g>

  <g opacity="0.7">
    <circle cx="522" cy="294" r="6" fill="#f0d060"/>
    <circle cx="1978" cy="278" r="6" fill="#67d9b0"/>
    <circle cx="2050" cy="1058" r="5" fill="#e8845a"/>
    <circle cx="1110" cy="164" r="4" fill="#8a8bdd"/>
  </g>

  <rect width="2400" height="1350" filter="url(#grain)" opacity="0.30"/>
  <rect width="2400" height="1350" fill="#0b1120" opacity="0.07"/>
</svg>
