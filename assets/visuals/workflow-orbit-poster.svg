  <rect width="2400" height="1800" fill="#0b1120"/>
  <rect width="2400" height="1800" fill="url(#bgGlowGold)"/>
  <rect width="2400" height="1800" fill="url(#bgGlowCoral)"/>
  <rect width="2400" height="1800" fill="url(#bgGlowMint)"/>

  <g opacity="0.22">
    <path d="M-60 1640 C 320 1510 440 1350 812 1422 C 1132 1484 1262 1728 1608 1642 C 1844 1584 1992 1360 2480 1460" fill="none" stroke="#f0d060" stroke-width="4" stroke-opacity="0.18"/>
    <path d="M-120 250 C 318 98 638 104 938 250 C 1278 416 1530 306 1838 182 C 2064 92 2230 120 2508 270" fill="none" stroke="#8a8bdd" stroke-width="5" stroke-opacity="0.20"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="145" y="112" width="2110" height="1574" rx="118" fill="url(#panel)" stroke="url(#panelEdge)" stroke-width="3"/>
    <rect x="174" y="142" width="2052" height="1516" rx="95" fill="none" stroke="#efeaff" stroke-opacity="0.08" stroke-width="2"/>
  </g>

  <g font-family="Sora, Work Sans, Avenir Next, Segoe UI, sans-serif">
