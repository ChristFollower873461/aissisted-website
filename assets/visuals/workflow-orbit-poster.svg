    <text x="2072" y="292" fill="#fff1aa" font-size="56" font-weight="800" text-anchor="end">PJ</text>
  </g>

  <g clip-path="url(#floorClip)">
    <path d="M 255 530 C 260 438 326 386 418 392 L 1992 392 C 2092 392 2152 456 2144 556 L 2050 1190 C 2038 1268 1978 1316 1898 1316 L 424 1316 C 328 1316 262 1254 267 1158 Z" fill="url(#floor)" stroke="#efeaff" stroke-opacity="0.14" stroke-width="3"/>
    <rect x="210" y="350" width="1980" height="1010" fill="url(#grid)" opacity="0.95"/>
    <rect x="210" y="350" width="1980" height="1010" fill="url(#fineGrid)" opacity="0.9"/>
    <g opacity="0.18">
      <path d="M 370 402 L 525 1316" stroke="#f0d060" stroke-width="2"/>
      <path d="M 805 392 L 885 1316" stroke="#8a8bdd" stroke-width="2"/>
      <path d="M 1210 392 L 1214 1316" stroke="#efeaff" stroke-width="2"/>
      <path d="M 1600 392 L 1538 1316" stroke="#8a8bdd" stroke-width="2"/>
      <path d="M 1992 392 L 1814 1316" stroke="#f0d060" stroke-width="2"/>
    </g>
    <g opacity="0.28">
      <path d="M 260 556 L 2144 556" stroke="#efeaff" stroke-width="2"/>
      <path d="M 245 748 L 2114 748" stroke="#efeaff" stroke-width="2"/>
      <path d="M 245 948 L 2082 948" stroke="#efeaff" stroke-width="2"/>
      <path d="M 268 1160 L 2049 1160" stroke="#efeaff" stroke-width="2"/>
    </g>
  </g>

  <path d="M 534 837 C 690 558 1004 456 1326 468 C 1712 482 2000 674 1998 930 C 1994 1186 1672 1335 1238 1283 C 772 1228 404 1057 534 837 Z" fill="none" stroke="#f0d060" stroke-opacity="0.42" stroke-width="6" stroke-linecap="round" stroke-dasharray="24 28" filter="url(#lineGlow)"/>
  <path d="M 552 846 C 714 596 1022 508 1322 522 C 1664 538 1910 696 1900 914 C 1888 1166 1550 1270 1218 1228 C 824 1178 432 1050 552 846 Z" fill="none" stroke="#8a8bdd" stroke-opacity="0.18" stroke-width="3"/>

  <g opacity="0.68">
    <circle cx="1218" cy="962" r="6" fill="#f0d060" opacity="0.28"/>
    <circle cx="1450" cy="714" r="4" fill="#b7b8ff" opacity="0.36"/>
    <circle cx="780" cy="1035" r="4" fill="#e8845a" opacity="0.42"/>
    <circle cx="1688" cy="1128" r="5" fill="#67d9b0" opacity="0.46"/>
  </g>

  <g font-family="Sora, Work Sans, Avenir Next, Segoe UI, sans-serif" font-weight="800" font-size="54" fill="#0b1120" text-anchor="middle">
    <g filter="url(#nodeShadow)">
      <rect x="330" y="574" width="416" height="168" rx="84" fill="#5f491a" opacity="0.40" transform="translate(18 34)"/>
      <rect x="320" y="548" width="416" height="168" rx="84" fill="url(#goldNode)"/>
      <path d="M 373 570 C 460 542 608 544 690 570" fill="none" stroke="#fff7ca" stroke-width="3" stroke-opacity="0.36"/>
      <text x="528" y="655">Intake</text>
    </g>
    <g filter="url(#nodeShadow)">
      <rect x="1637" y="725" width="418" height="170" rx="85" fill="#34367a" opacity="0.42" transform="translate(18 34)"/>
      <rect x="1624" y="700" width="418" height="170" rx="85" fill="url(#violetNode)"/>
      <path d="M 1678 724 C 1764 694 1902 696 1990 724" fill="none" stroke="#fff" stroke-width="3" stroke-opacity="0.30"/>
      <text x="1833" y="808">Safety</text>
    </g>
    <g filter="url(#nodeShadow)">
      <rect x="442" y="1091" width="424" height="174" rx="87" fill="#74314e" opacity="0.44" transform="translate(18 34)"/>
      <rect x="428" y="1066" width="424" height="174" rx="87" fill="url(#coralNode)"/>
      <path d="M 484 1090 C 572 1060 712 1062 800 1090" fill="none" stroke="#ffe6d6" stroke-width="3" stroke-opacity="0.32"/>
      <text x="640" y="1171">Follow-up</text>
    </g>
    <g filter="url(#mintGlow)">
      <rect x="1600" y="1114" width="416" height="174" rx="87" fill="#1e614f" opacity="0.42" transform="translate(18 34)"/>
      <rect x="1586" y="1088" width="416" height="174" rx="87" fill="url(#mintNode)"/>
      <path d="M 1640 1112 C 1728 1082 1868 1084 1954 1112" fill="none" stroke="#d9ffef" stroke-width="3" stroke-opacity="0.34"/>
      <text x="1794" y="1195">Review</text>
    </g>
  </g>

  <g opacity="0.42" fill="none" stroke-linecap="round">
    <path d="M 690 630 C 922 458 1164 414 1406 480" stroke="#f0d060" stroke-width="4" stroke-dasharray="2 18"/>
    <path d="M 1816 858 C 1826 1004 1744 1088 1652 1136" stroke="#67d9b0" stroke-width="4" stroke-dasharray="2 18"/>
    <path d="M 860 1162 C 1068 1242 1294 1262 1540 1184" stroke="#e8845a" stroke-width="4" stroke-dasharray="2 18"/>
  </g>

  <path d="M 260 1412 L 2140 1412" stroke="#f0d060" stroke-opacity="0.46" stroke-width="3"/>
  <g font-family="Sora, Work Sans, Avenir Next, Segoe UI, sans-serif">
    <text x="260" y="1530" fill="#fff4be" font-size="66" font-weight="850">One useful workflow first.</text>
    <text x="260" y="1618" fill="#efeaff" fill-opacity="0.88" font-size="48" font-weight="500">No giant transformation pitch. Start with the daily work that is already slipping.</text>
  </g>

  <g opacity="0.28">
    <rect x="144" y="112" width="2112" height="1576" rx="118" fill="none" stroke="#f0d060" stroke-width="2"/>
    <rect x="196" y="164" width="2008" height="1472" rx="90" fill="none" stroke="#c4456a" stroke-width="2" stroke-opacity="0.42"/>
  </g>
</svg>
