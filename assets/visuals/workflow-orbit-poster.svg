<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1800" viewBox="0 0 2400 1800" role="img" aria-labelledby="title desc">
  <title id="title">AIssisted Consulting workflow orbit poster</title>
  <desc id="desc">A premium dark AI Guy branded workflow orbit showing Intake, Safety, Follow-up, and Review in a dimensional grid space.</desc>
  <defs>
    <radialGradient id="bgGlowGold" cx="14%" cy="20%" r="62%">
      <stop offset="0%" stop-color="#f0d060" stop-opacity="0.28"/>
      <stop offset="44%" stop-color="#8a8bdd" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0b1120" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlowCoral" cx="96%" cy="86%" r="58%">
      <stop offset="0%" stop-color="#c4456a" stop-opacity="0.52"/>
      <stop offset="52%" stop-color="#3d1d5e" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#0b1120" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlowMint" cx="72%" cy="36%" r="42%">
      <stop offset="0%" stop-color="#67d9b0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0b1120" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#182442" stop-opacity="0.92"/>
      <stop offset="48%" stop-color="#151230" stop-opacity="0.84"/>
      <stop offset="100%" stop-color="#0b1120" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="panelEdge" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f0d060" stop-opacity="0.72"/>
      <stop offset="38%" stop-color="#8a8bdd" stop-opacity="0.36"/>
      <stop offset="100%" stop-color="#c4456a" stop-opacity="0.56"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1c2d56" stop-opacity="0.72"/>
      <stop offset="56%" stop-color="#151230" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#0b1120" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="goldNode" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffe88d"/>
      <stop offset="58%" stop-color="#f0d060"/>
      <stop offset="100%" stop-color="#d4a843"/>
    </linearGradient>
    <linearGradient id="violetNode" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#d9d5ff"/>
      <stop offset="58%" stop-color="#b7b8ff"/>
      <stop offset="100%" stop-color="#8a8bdd"/>
    </linearGradient>
    <linearGradient id="coralNode" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffb285"/>
      <stop offset="58%" stop-color="#e8845a"/>
      <stop offset="100%" stop-color="#c4456a"/>
    </linearGradient>
    <linearGradient id="mintNode" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#8ff5ce"/>
      <stop offset="54%" stop-color="#67d9b0"/>
      <stop offset="100%" stop-color="#36a986"/>
    </linearGradient>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#03050e" flood-opacity="0.46"/>
    </filter>
    <filter id="nodeShadow" x="-55%" y="-65%" width="210%" height="230%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#03050e" flood-opacity="0.50"/>
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#f0d060" flood-opacity="0.08"/>
    </filter>
    <filter id="mintGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#03050e" flood-opacity="0.50"/>
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#67d9b0" flood-opacity="0.28"/>
    </filter>
    <filter id="lineGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.94  0 1 0 0 0.81  0 0 1 0 0.38  0 0 0 0.40 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="112" height="112" patternUnits="userSpaceOnUse">
      <path d="M 112 0 L 0 0 0 112" fill="none" stroke="#efeaff" stroke-opacity="0.10" stroke-width="2"/>
    </pattern>
    <pattern id="fineGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#efeaff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <clipPath id="floorClip">
      <path d="M 255 530 C 260 438 326 386 418 392 L 1992 392 C 2092 392 2152 456 2144 556 L 2050 1190 C 2038 1268 1978 1316 1898 1316 L 424 1316 C 328 1316 262 1254 267 1158 Z"/>
    </clipPath>
