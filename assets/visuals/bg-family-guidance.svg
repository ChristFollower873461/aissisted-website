<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1350" viewBox="0 0 2400 1350" role="img" aria-labelledby="title desc">
  <title id="title">Family AI guidance background</title>
  <desc id="desc">A warm AIssisted Consulting family guidance background showing a kitchen table with a tablet, notebook, privacy cards, and soft AI Guy brand lighting.</desc>
  <defs>
    <radialGradient id="lampGlow" cx="22%" cy="18%" r="56%">
      <stop offset="0%" stop-color="#f0d060" stop-opacity="0.42"/>
      <stop offset="42%" stop-color="#e8845a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0b1120" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="84%" cy="24%" r="50%">
      <stop offset="0%" stop-color="#8a8bdd" stop-opacity="0.32"/>
      <stop offset="52%" stop-color="#3d1d5e" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0b1120" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="70%" cy="78%" r="42%">
      <stop offset="0%" stop-color="#67d9b0" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#0b1120" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wall" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#151230"/>
      <stop offset="52%" stop-color="#101b34"/>
      <stop offset="100%" stop-color="#0b1120"/>
    </linearGradient>
    <linearGradient id="table" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1c2d56"/>
      <stop offset="46%" stop-color="#152344"/>
      <stop offset="100%" stop-color="#151230"/>
    </linearGradient>
    <linearGradient id="tablet" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#202c4f"/>
      <stop offset="58%" stop-color="#101b34"/>
      <stop offset="100%" stop-color="#060a15"/>
    </linearGradient>
    <linearGradient id="tabletScreen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#182b5c"/>
      <stop offset="58%" stop-color="#151230"/>
      <stop offset="100%" stop-color="#090e1d"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff4d4"/>
      <stop offset="100%" stop-color="#d8cee9"/>
    </linearGradient>
    <linearGradient id="lamp" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffe59b"/>
      <stop offset="100%" stop-color="#d4a843"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-35%" width="170%" height="180%">
      <feDropShadow dx="0" dy="34" stdDeviation="30" flood-color="#03050e" flood-opacity="0.46"/>
    </filter>
    <filter id="closeShadow" x="-25%" y="-30%" width="150%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#03050e" flood-opacity="0.38"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="31" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.15"/>
      </feComponentTransfer>
    </filter>
    <pattern id="tableLines" width="210" height="160" patternUnits="userSpaceOnUse">
      <path d="M 0 22 C 64 10 136 10 210 22 M 0 112 C 64 100 136 100 210 112" fill="none" stroke="#efeaff" stroke-opacity="0.028" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="2400" height="1350" fill="url(#wall)"/>
  <rect width="2400" height="1350" fill="url(#lampGlow)"/>
  <rect width="2400" height="1350" fill="url(#violetGlow)"/>
  <rect width="2400" height="1350" fill="url(#mintGlow)"/>

  <g opacity="0.28">
    <path d="M-80 308 C 340 172 656 214 966 364 C 1264 508 1516 470 1830 278 C 2070 132 2250 126 2490 250" fill="none" stroke="#8a8bdd" stroke-width="5" stroke-opacity="0.20"/>
    <path d="M-120 1120 C 316 950 656 1000 1018 1136 C 1388 1276 1770 1256 2520 998" fill="none" stroke="#f0d060" stroke-width="4" stroke-opacity="0.18"/>
  </g>

  <g transform="translate(0 620)" filter="url(#softShadow)">
    <path d="M -110 368 C 384 178 918 94 1502 144 C 1862 176 2154 284 2512 466 L 2438 882 L -58 882 Z" fill="url(#table)"/>
    <path d="M -110 368 C 384 178 918 94 1502 144 C 1862 176 2154 284 2512 466 L 2438 882 L -58 882 Z" fill="url(#tableLines)"/>
    <path d="M 20 392 C 572 246 1054 194 1514 236 C 1882 270 2188 392 2400 506" fill="none" stroke="#f0d060" stroke-width="3" stroke-opacity="0.16"/>
  </g>

  <g transform="translate(164 300)" filter="url(#softShadow)" opacity="0.94">
    <path d="M 92 330 C 78 250 106 176 162 126 C 222 74 314 54 398 88 C 482 122 526 198 514 288 C 502 378 424 442 320 446 C 212 450 108 414 92 330 Z" fill="url(#lamp)"/>
    <path d="M 220 430 L 388 430 L 426 594 L 174 594 Z" fill="#151230"/>
    <path d="M 150 594 L 450 594 C 480 594 504 618 504 648 L 96 648 C 96 618 120 594 150 594 Z" fill="#101b34"/>
    <path d="M 152 188 C 232 132 362 128 442 188" fill="none" stroke="#fff5c7" stroke-width="7" stroke-opacity="0.34" stroke-linecap="round"/>
  </g>

  <g transform="translate(666 288) rotate(-7)" filter="url(#softShadow)">
    <rect x="0" y="0" width="860" height="610" rx="72" fill="url(#tablet)"/>
    <rect x="58" y="68" width="744" height="468" rx="48" fill="url(#tabletScreen)"/>
    <circle cx="430" cy="570" r="20" fill="#efeaff" opacity="0.18"/>
    <rect x="122" y="130" width="250" height="24" rx="12" fill="#f0d060"/>
    <rect x="122" y="202" width="560" height="18" rx="9" fill="#b7b8ff" opacity="0.70"/>
    <rect x="122" y="266" width="450" height="18" rx="9" fill="#67d9b0" opacity="0.68"/>
    <rect x="122" y="330" width="520" height="18" rx="9" fill="#efeaff" opacity="0.22"/>
    <rect x="122" y="394" width="340" height="18" rx="9" fill="#e8845a" opacity="0.70"/>
    <g transform="translate(574 238)">
      <circle cx="78" cy="78" r="94" fill="#c4456a" opacity="0.42"/>
      <circle cx="78" cy="78" r="48" fill="#e8845a" opacity="0.76"/>
      <path d="M 56 80 L 74 98 L 108 54" fill="none" stroke="#fff4cf" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <g transform="translate(186 772) rotate(8)" filter="url(#closeShadow)">
    <rect x="0" y="0" width="468" height="300" rx="34" fill="url(#paper)"/>
    <rect x="42" y="44" width="188" height="20" rx="10" fill="#8a8bdd" opacity="0.82"/>
    <rect x="42" y="96" width="342" height="14" rx="7" fill="#151230" opacity="0.34"/>
    <rect x="42" y="136" width="300" height="14" rx="7" fill="#151230" opacity="0.26"/>
    <rect x="42" y="176" width="382" height="14" rx="7" fill="#151230" opacity="0.22"/>
    <circle cx="78" cy="240" r="28" fill="#67d9b0" opacity="0.84"/>
    <path d="M 66 240 L 76 250 L 94 226" fill="none" stroke="#0b1120" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="124" y="251" fill="#151230" font-family="Sora, Work Sans, Avenir Next, Segoe UI, sans-serif" font-size="31" font-weight="850">privacy first</text>
  </g>

  <g transform="translate(1462 762) rotate(-8)" filter="url(#closeShadow)">
    <rect x="0" y="0" width="494" height="306" rx="36" fill="#101b34"/>
    <rect x="42" y="42" width="138" height="20" rx="10" fill="#f0d060"/>
    <rect x="42" y="92" width="390" height="16" rx="8" fill="#efeaff" opacity="0.36"/>
    <rect x="42" y="136" width="338" height="16" rx="8" fill="#efeaff" opacity="0.24"/>
    <rect x="42" y="180" width="280" height="16" rx="8" fill="#efeaff" opacity="0.18"/>
    <g transform="translate(360 184)">
      <rect x="-36" y="-48" width="104" height="112" rx="24" fill="#67d9b0" opacity="0.82"/>
      <path d="M -10 -8 L 12 14 L 46 -30" fill="none" stroke="#0b1120" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <g transform="translate(1784 344) rotate(10)" filter="url(#closeShadow)">
    <rect x="0" y="0" width="310" height="470" rx="48" fill="#0a1020"/>
    <rect x="34" y="64" width="242" height="330" rx="34" fill="#101b34"/>
    <rect x="70" y="112" width="160" height="20" rx="10" fill="#f0d060"/>
    <rect x="70" y="168" width="146" height="18" rx="9" fill="#8a8bdd" opacity="0.74"/>
    <rect x="70" y="224" width="174" height="18" rx="9" fill="#67d9b0" opacity="0.70"/>
    <rect x="70" y="280" width="108" height="18" rx="9" fill="#e8845a" opacity="0.76"/>
    <circle cx="155" cy="426" r="18" fill="#efeaff" opacity="0.18"/>
  </g>

  <g transform="translate(1000 966)" filter="url(#closeShadow)">
    <ellipse cx="0" cy="0" rx="260" ry="82" fill="#03050e" opacity="0.32"/>
    <rect x="-248" y="-112" width="496" height="164" rx="44" fill="#152344"/>
    <rect x="-204" y="-72" width="172" height="18" rx="9" fill="#f0d060"/>
    <rect x="-204" y="-28" width="354" height="14" rx="7" fill="#efeaff" opacity="0.32"/>
    <rect x="-204" y="12" width="286" height="14" rx="7" fill="#efeaff" opacity="0.20"/>
