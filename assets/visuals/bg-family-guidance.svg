  <g opacity="0.72" font-family="Sora, Work Sans, Avenir Next, Segoe UI, sans-serif">
    <text x="150" y="214" fill="#fff4cf" font-size="54" font-weight="850">Family AI guidance</text>
    <text x="150" y="286" fill="#d7d1ef" font-size="32" font-weight="600">Plain-English setup, boundaries, and safer daily use</text>
  </g>

  <g opacity="0.72">
    <circle cx="520" cy="262" r="6" fill="#f0d060"/>
    <circle cx="2062" cy="232" r="6" fill="#67d9b0"/>
    <circle cx="2012" cy="1060" r="5" fill="#e8845a"/>
    <circle cx="1114" cy="166" r="4" fill="#8a8bdd"/>
