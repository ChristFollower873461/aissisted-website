<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1350" viewBox="0 0 2400 1350" role="img" aria-labelledby="title desc">
  <title id="title">Small business workflow desk background</title>
  <desc id="desc">A branded AIssisted Consulting background showing a small business desk with a laptop, phone, calendar, notebook, and intake notes in dark navy, gold, coral, violet, and mint lighting.</desc>
  <defs>
    <radialGradient id="goldGlow" cx="20%" cy="18%" r="58%">
      <stop offset="0%" stop-color="#f0d060" stop-opacity="0.28"/>
      <stop offset="52%" stop-color="#8a8bdd" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0b1120" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coralGlow" cx="92%" cy="82%" r="54%">
      <stop offset="0%" stop-color="#c4456a" stop-opacity="0.48"/>
      <stop offset="42%" stop-color="#3d1d5e" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#0b1120" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="75%" cy="28%" r="34%">
      <stop offset="0%" stop-color="#67d9b0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0b1120" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="desk" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#182442"/>
      <stop offset="46%" stop-color="#101b34"/>
      <stop offset="100%" stop-color="#151230"/>
    </linearGradient>
    <linearGradient id="laptopBody" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#26365d"/>
      <stop offset="58%" stop-color="#101b34"/>
      <stop offset="100%" stop-color="#070b16"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#17295a"/>
      <stop offset="44%" stop-color="#151230"/>
      <stop offset="100%" stop-color="#090e1d"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8f0d6"/>
      <stop offset="100%" stop-color="#d7ca9f"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#222b44"/>
      <stop offset="100%" stop-color="#070b16"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="36" stdDeviation="30" flood-color="#03050e" flood-opacity="0.48"/>
    </filter>
    <filter id="closeShadow" x="-25%" y="-25%" width="150%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#03050e" flood-opacity="0.40"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="23" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.18"/>
      </feComponentTransfer>
    </filter>
    <pattern id="deskLines" width="180" height="180" patternUnits="userSpaceOnUse">
      <path d="M 0 0 L 180 180 M 180 0 L 0 180" stroke="#efeaff" stroke-opacity="0.025" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="2400" height="1350" fill="#0b1120"/>
  <rect width="2400" height="1350" fill="url(#goldGlow)"/>
  <rect width="2400" height="1350" fill="url(#coralGlow)"/>
  <rect width="2400" height="1350" fill="url(#mintGlow)"/>

  <g opacity="0.42">
    <path d="M-80 250 C 280 138 552 166 822 312 C 1124 475 1425 390 1750 236 C 1992 122 2184 148 2510 314" fill="none" stroke="#8a8bdd" stroke-width="5" stroke-opacity="0.18"/>
    <path d="M-100 1120 C 388 960 726 1010 1048 1148 C 1390 1296 1768 1240 2490 1004" fill="none" stroke="#f0d060" stroke-width="4" stroke-opacity="0.16"/>
  </g>

  <g transform="translate(120 470) perspective(1200)" filter="url(#softShadow)">
    <path d="M 0 470 C 470 275 990 176 1540 220 C 1820 242 2042 332 2160 470 L 1988 834 C 1388 1028 708 1008 88 832 Z" fill="url(#desk)"/>
    <path d="M 0 470 C 470 275 990 176 1540 220 C 1820 242 2042 332 2160 470 L 1988 834 C 1388 1028 708 1008 88 832 Z" fill="url(#deskLines)" opacity="0.8"/>
    <path d="M 40 500 C 575 330 1012 255 1520 292 C 1770 310 1948 382 2086 494" fill="none" stroke="#f0d060" stroke-width="3" stroke-opacity="0.18"/>
  </g>

  <g transform="translate(682 274)" filter="url(#softShadow)">
    <path d="M 76 46 C 80 12 106 -4 142 2 L 1058 120 C 1100 126 1122 156 1118 198 L 1038 676 C 1030 720 994 744 950 736 L 28 610 C -8 604 -28 574 -20 538 Z" fill="#050815"/>
    <path d="M 118 78 L 1066 198 L 982 676 L 42 552 Z" fill="url(#screen)"/>
    <path d="M 150 122 L 1016 232 L 948 622 L 88 510 Z" fill="#101b34" opacity="0.92"/>
    <path d="M 192 184 L 516 224" stroke="#f0d060" stroke-width="16" stroke-linecap="round" opacity="0.9"/>
    <path d="M 194 250 L 710 316" stroke="#8a8bdd" stroke-width="12" stroke-linecap="round" opacity="0.78"/>
    <path d="M 194 306 L 622 360" stroke="#67d9b0" stroke-width="12" stroke-linecap="round" opacity="0.72"/>
    <path d="M 780 338 C 850 288 948 324 968 412 C 988 500 896 582 812 548 C 728 514 710 388 780 338 Z" fill="#c4456a" opacity="0.42"/>
    <path d="M 810 382 C 848 358 900 376 910 424 C 920 470 872 514 828 496 C 784 478 772 406 810 382 Z" fill="#e8845a" opacity="0.74"/>
    <path d="M -82 618 L 1080 772 C 1118 776 1142 808 1124 838 C 1108 866 1068 878 1028 872 L -126 714 C -162 708 -182 680 -166 652 C -150 626 -118 612 -82 618 Z" fill="url(#laptopBody)"/>
    <path d="M 354 704 L 706 750 C 726 754 730 778 710 786 L 428 748 C 392 742 360 728 354 704 Z" fill="#070b16" opacity="0.52"/>
  </g>

  <g transform="translate(226 748) rotate(-8)" filter="url(#closeShadow)">
    <rect x="0" y="0" width="392" height="270" rx="28" fill="url(#paper)"/>
    <rect x="38" y="42" width="128" height="18" rx="9" fill="#c4456a" opacity="0.72"/>
    <rect x="38" y="86" width="290" height="13" rx="7" fill="#151230" opacity="0.42"/>
    <rect x="38" y="122" width="250" height="13" rx="7" fill="#151230" opacity="0.30"/>
    <rect x="38" y="158" width="310" height="13" rx="7" fill="#151230" opacity="0.24"/>
    <circle cx="62" cy="216" r="22" fill="#67d9b0" opacity="0.8"/>
    <path d="M 52 216 L 60 224 L 76 204" fill="none" stroke="#0b1120" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="100" y="226" fill="#151230" font-family="Sora, Work Sans, Avenir Next, Segoe UI, sans-serif" font-size="31" font-weight="800">intake note</text>
  </g>

  <g transform="translate(1542 692) rotate(9)" filter="url(#closeShadow)">
    <rect x="0" y="0" width="408" height="284" rx="34" fill="#efeaff"/>
    <rect x="0" y="0" width="408" height="70" rx="34" fill="#8a8bdd"/>
    <rect x="0" y="42" width="408" height="40" fill="#8a8bdd"/>
    <g fill="#151230" opacity="0.56">
      <rect x="46" y="112" width="54" height="38" rx="12"/>
      <rect x="126" y="112" width="54" height="38" rx="12"/>
      <rect x="206" y="112" width="54" height="38" rx="12"/>
      <rect x="286" y="112" width="54" height="38" rx="12"/>
      <rect x="46" y="174" width="54" height="38" rx="12"/>
      <rect x="126" y="174" width="54" height="38" rx="12"/>
      <rect x="206" y="174" width="54" height="38" rx="12"/>
      <rect x="286" y="174" width="54" height="38" rx="12"/>
    </g>
    <rect x="206" y="174" width="54" height="38" rx="12" fill="#f0d060"/>
  </g>

  <g transform="translate(1768 360) rotate(16)" filter="url(#closeShadow)">
    <rect x="0" y="0" width="228" height="410" rx="42" fill="url(#phone)"/>
    <rect x="26" y="48" width="176" height="300" rx="30" fill="#101b34"/>
    <circle cx="114" cy="374" r="16" fill="#efeaff" opacity="0.18"/>
    <rect x="54" y="92" width="118" height="18" rx="9" fill="#f0d060"/>
    <rect x="54" y="142" width="94" height="16" rx="8" fill="#67d9b0" opacity="0.82"/>
    <rect x="54" y="190" width="124" height="16" rx="8" fill="#8a8bdd" opacity="0.72"/>
    <rect x="54" y="238" width="82" height="16" rx="8" fill="#e8845a" opacity="0.78"/>
  </g>

  <g transform="translate(1118 920) rotate(-4)" filter="url(#closeShadow)">
    <rect x="0" y="0" width="480" height="220" rx="34" fill="#101b34"/>
    <rect x="34" y="38" width="156" height="20" rx="10" fill="#f0d060"/>
    <rect x="34" y="86" width="386" height="14" rx="7" fill="#efeaff" opacity="0.36"/>
    <rect x="34" y="124" width="330" height="14" rx="7" fill="#efeaff" opacity="0.22"/>
    <rect x="34" y="162" width="260" height="14" rx="7" fill="#efeaff" opacity="0.18"/>
    <circle cx="392" cy="62" r="32" fill="#67d9b0" opacity="0.82"/>
  </g>

  <g opacity="0.66" font-family="Sora, Work Sans, Avenir Next, Segoe UI, sans-serif">
    <text x="160" y="228" fill="#fff4cf" font-size="54" font-weight="850">Small business workflow help</text>
    <text x="160" y="300" fill="#d7d1ef" font-size="32" font-weight="600">Intake, scheduling, follow-up, and owner visibility</text>
  </g>

  <g opacity="0.8">
    <circle cx="512" cy="366" r="5" fill="#f0d060"/>
    <circle cx="1894" cy="274" r="6" fill="#67d9b0"/>
    <circle cx="2030" cy="1036" r="5" fill="#e8845a"/>
    <circle cx="1036" cy="188" r="4" fill="#8a8bdd"/>
  </g>

  <rect width="2400" height="1350" filter="url(#grain)" opacity="0.32"/>
  <rect width="2400" height="1350" fill="#0b1120" opacity="0.08"/>
</svg>
